<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       
        header {
            display: flex;
            align-items: center;
            padding: 15px;
        }

        header img {
            width: 120px;
            height: auto;
            margin-right: 15px;
        }

        h1 {
            margin: 0;
        }

        p {
            padding-left: 15px;
        }

        .imagen-principal img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <img src="./logo.png" alt="Logo concierto">
        <h1>Tu concierto</h1>
    </header>

    <p>Bienvenido a este blog de conciertos...</p>

    <div class="imagen-principal">
        <img src="./img_principal.png" alt="Imagen concierto">
    </div>

</body>
</html>
